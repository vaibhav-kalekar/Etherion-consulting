name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install dependencies, build CSS and Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          # Project Pages base URL for GitHub Pages (project site)
          HUGO_BASEURL: "https://vaibhav-kalekar.github.io/Etherion-consulting/"
        run: |
          npm ci
          # build Tailwind CSS into static/css/style.css so Hugo can use it without PostCSS
          npx tailwindcss -i themes/hugo-saasify-theme/assets/css/main.css -o static/css/style.css --minify
          # ensure local node binaries are on PATH (for any tools)
          export PATH="$PWD/node_modules/.bin:$PATH"
          hugo --minify --baseURL "$HUGO_BASEURL"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
